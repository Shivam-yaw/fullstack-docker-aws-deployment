services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - appnet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: shivamyawlkar/backend:latest
    container_name: backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      # If your backend supports env-based Mongo URL, use it.
      # If not, update backend/app/config/db.config.js to point to "mongo"
      # Example: mongodb://mongo:27017/<dbname>
      - MONGO_URI=mongodb://mongo:27017/dd_db
      - NODE_ENV=production
    expose:
      - "5000"
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: shivamyawlkar/frontend:latest
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

volumes:
  mongo_data:

networks:
  appnet:
    driver: bridge
