version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo_data:/data/db

  backend:
    image: shivamyawlkar/backend:latest
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/appdb
      PORT: "8080"
    expose:
      - "8080"
      
  frontend:
    image: shivamyawlkar/frontend:latest
    container_name: frontend
    expose:
      - "80"
      
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
